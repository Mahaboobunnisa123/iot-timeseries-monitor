version: "3.8"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: tsdb
      POSTGRES_USER: tsadmin
      POSTGRES_PASSWORD: tsadminpass
      TIMESCALEDB_TELEMETRY: "off"
    ports:
      - "5432:5432"
    volumes:
      - ts_data:/var/lib/postgresql/data

volumes:
  ts_data:
    driver: local